<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <title>Pingform</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <!-- Login screen -->
    <section id="screen-login" class="screen" hidden>
      <header class="brand">
        <span class="brand-mark"></span>
        <span class="brand-name" data-brand-name>Pingform</span>
      </header>

      <form id="login-form" autocomplete="on">
        <label class="label" for="login-email">Email</label>
        <input id="login-email" type="email" class="input" autocomplete="username" required />

        <label class="label" for="login-password">Password</label>
        <input id="login-password" type="password" class="input" autocomplete="current-password" required />

        <p id="login-error" class="error" hidden></p>

        <button class="btn-primary" id="login-submit" type="submit">
          <span class="btn-label">Sign in</span>
          <span class="spinner" aria-hidden="true"></span>
        </button>

        <a class="link-muted" href="#" id="forgot-link">Forgot password?</a>
      </form>
    </section>

    <!-- Main screen -->
    <section id="screen-main" class="screen" hidden>
      <header class="topbar">
        <div class="brand small">
          <span class="brand-mark"></span>
          <span class="brand-name" data-brand-name>Pingform</span>
        </div>
        <div class="topbar-actions">
          <button id="open-settings" class="icon-btn" title="Settings" hidden>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
          <button id="signout" class="avatar" title="Sign out">
            <span id="avatar-initial">·</span>
          </button>
        </div>
      </header>

      <h1 id="practice-name" class="practice-name">Loading…</h1>

      <!-- Billing strip — shows current plan + SMS usage. -->
      <div id="billing-strip" class="billing-strip" hidden>
        <div class="billing-row">
          <span id="billing-plan" class="billing-plan">Free</span>
          <span id="billing-usage" class="billing-usage">0 / 10</span>
        </div>
        <div class="billing-bar"><div id="billing-bar-fill" class="billing-bar-fill"></div></div>
      </div>

      <!-- Phone input -->
      <div id="state-input" class="state">
        <label class="label" for="phone">Client mobile</label>
        <input
          id="phone"
          class="input phone"
          inputmode="tel"
          autocomplete="tel"
          placeholder="07700 900 123"
        />
        <p id="send-error" class="error" hidden></p>
        <button class="btn-primary full" id="send-btn" disabled>
          <span class="btn-label">Send by SMS</span>
          <span class="spinner" aria-hidden="true"></span>
        </button>
        <button class="btn-secondary full" id="wa-btn" disabled hidden>
          Send via WhatsApp
        </button>
      </div>

      <!-- Waiting state -->
      <div id="state-waiting" class="state" hidden>
        <div class="pulse">
          <div class="pulse-dot"></div>
        </div>
        <p class="waiting-title">Form sent</p>
        <p class="waiting-sub" id="waiting-sub">Waiting for the client to fill it in…</p>
        <button class="btn-ghost" id="cancel-wait">Send another</button>
      </div>

      <!-- Result state -->
      <div id="state-result" class="state" hidden>
        <div class="result-header">
          <p class="result-title">
            <span class="dot success"></span> Client submitted
          </p>
          <button class="btn-ghost small" id="copy-all">Copy all</button>
        </div>
        <ul id="result-fields" class="fields"></ul>
        <button class="btn-primary full" id="send-another">Send another</button>
      </div>
    </section>

    <!-- Settings screen (admins only) -->
    <section id="screen-settings" class="screen" hidden>
      <header class="topbar">
        <button id="settings-back" class="icon-btn" title="Back">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <p class="settings-title">Settings</p>
        <div style="width:28px"></div>
      </header>

      <form id="settings-form">
        <p id="settings-loading" class="muted-line">Loading…</p>

        <fieldset id="settings-fields" disabled hidden>
          <h3 class="section-h">Business name</h3>
          <input class="input" id="ws-name" />

          <h3 class="section-h">Message clients receive</h3>
          <p class="muted-line">Use <code>{business_name}</code> and <code>{link}</code>.</p>
          <textarea class="input" id="ws-sms" rows="4"></textarea>

          <p id="settings-error" class="error" hidden></p>

          <button class="btn-primary full" id="settings-save" type="submit">
            <span class="btn-label">Save</span>
            <span class="spinner" aria-hidden="true"></span>
          </button>
          <span id="settings-saved" class="muted-line" hidden style="text-align:center;color:#22C55E;font-weight:600;margin-top:8px;display:block">Saved</span>

          <a id="open-dashboard" class="dashboard-link" href="#">Manage forms, team &amp; billing →</a>
        </fieldset>
      </form>
    </section>

    <!-- Pusher client (loaded locally to satisfy MV3 CSP) -->
    <script src="lib/pusher.min.js"></script>
    <script src="config.js"></script>
    <script src="lib/phone.js"></script>
    <script src="lib/api.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
